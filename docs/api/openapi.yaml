openapi: 3.1.0
info:
  title: Fleet Management System API
  version: 1.0.0
  summary: Multi-tenant fleet operations, maintenance, compliance, and reporting API
  description: |
    Baseline OpenAPI contract for the production-oriented Fleet Management System.
    This document currently focuses on authentication and reporting workflows that
    drive the Phase 5 analytics dashboard and export center.
servers:
  - url: http://localhost:8000
    description: Local Laravel host
tags:
  - name: Authentication
  - name: Reporting
components:
  securitySchemes:
    sanctumCookie:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Session cookie issued by Laravel Sanctum SPA authentication.
  schemas:
    ApiMessage:
      type: object
      properties:
        message:
          type: string
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    ReferenceOption:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        secondary:
          type:
            - string
            - "null"
    ReportMetric:
      type: object
      properties:
        label:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: integer
        tone:
          type: string
          enum: [default, success, warning, danger, info]
        hint:
          type:
            - string
            - "null"
    DashboardChartSeries:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [bar, line]
        data:
          type: array
          items:
            oneOf:
              - type: string
              - type: number
    DashboardPieItem:
      type: object
      properties:
        name:
          type: string
        value:
          type: integer
    DashboardChart:
      type: object
      properties:
        type:
          type: string
          enum: [pie, bar, mixed]
        categories:
          type: array
          items:
            type: string
        series:
          type: array
          items:
            $ref: '#/components/schemas/DashboardChartSeries'
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardPieItem'
    DashboardAnalytics:
      type: object
      properties:
        filters:
          type: object
          properties:
            date_from:
              type: string
              format: date
            date_to:
              type: string
              format: date
            vehicle_id:
              type:
                - integer
                - "null"
            department_id:
              type:
                - integer
                - "null"
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/ReportMetric'
        charts:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DashboardChart'
        highlights:
          type: object
    ReportColumn:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
    ReportDataset:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        description:
          type: string
        summary_metrics:
          type: array
          items:
            $ref: '#/components/schemas/ReportMetric'
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ReportColumn'
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        filters:
          type: object
          additionalProperties: true
        export_formats:
          type: array
          items:
            type: string
    ReportExport:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        requested_by:
          type: integer
        report_type:
          type: string
        format:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]
        filters:
          type: object
          additionalProperties: true
        file_name:
          type:
            - string
            - "null"
        mime_type:
          type:
            - string
            - "null"
        row_count:
          type:
            - integer
            - "null"
        error_message:
          type:
            - string
            - "null"
        download_url:
          type:
            - string
            - "null"
        requester:
          type:
            - object
            - "null"
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
              format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type:
            - integer
            - "null"
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
        is_super_admin:
          type: boolean
        permissions:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User or tenant is inactive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many failed attempts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: End the authenticated session
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Session invalidated.
  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Get the authenticated user profile
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Current authenticated user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
  /api/v1/reports/support-data:
    get:
      tags: [Reporting]
      summary: Get report filter support data
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Report filter and definition payload.
  /api/v1/reports/dashboard:
    get:
      tags: [Reporting]
      summary: Get dashboard analytics
      security:
        - sanctumCookie: []
      parameters:
        - name: filter[date_from]
          in: query
          schema:
            type: string
            format: date
        - name: filter[date_to]
          in: query
          schema:
            type: string
            format: date
        - name: filter[vehicle_id]
          in: query
          schema:
            type: integer
        - name: filter[department_id]
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Dashboard analytics payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/DashboardAnalytics'
  /api/v1/reports/fleet-overview:
    get:
      tags: [Reporting]
      summary: Fleet overview report dataset
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Fleet overview dataset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/ReportDataset'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/reports/vehicle-utilization:
    get:
      tags: [Reporting]
      summary: Vehicle utilization report dataset
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Vehicle utilization dataset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/ReportDataset'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/reports/fuel-consumption:
    get:
      tags: [Reporting]
      summary: Fuel consumption report dataset
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Fuel report dataset.
  /api/v1/reports/maintenance-cost:
    get:
      tags: [Reporting]
      summary: Maintenance cost report dataset
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Maintenance cost dataset.
  /api/v1/reports/compliance-status:
    get:
      tags: [Reporting]
      summary: Compliance status report dataset
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Compliance dataset.
  /api/v1/reports/incident-summary:
    get:
      tags: [Reporting]
      summary: Incident summary report dataset
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Incident dataset.
  /api/v1/reports/exports:
    get:
      tags: [Reporting]
      summary: List recent report exports
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Paginated report exports.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReportExport'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Reporting]
      summary: Queue a report export
      security:
        - sanctumCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, format]
              properties:
                type:
                  type: string
                format:
                  type: string
                  enum: [csv]
                search:
                  type: string
                filter:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Export queued or completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/ReportExport'
        '403':
          description: Missing export permission.
        '429':
          description: Export rate limit exceeded.
  /api/v1/reports/exports/{reportExport}:
    get:
      tags: [Reporting]
      summary: Get a report export job
      security:
        - sanctumCookie: []
      parameters:
        - name: reportExport
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Report export detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/ReportExport'
  /api/v1/reports/exports/{reportExport}/download:
    get:
      tags: [Reporting]
      summary: Download a completed CSV export
      security:
        - sanctumCookie: []
      parameters:
        - name: reportExport
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Streamed CSV file.
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '422':
          description: Export not ready.
