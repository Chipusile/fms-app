services:
  postgres:
    image: postgres:16-alpine
    container_name: fms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fms
      POSTGRES_USER: fms
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fms -d fms"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${FMS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fms-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${FMS_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: fms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${FMS_MINIO_PORT:-9000}:9000"
      - "${FMS_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: fms-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 2;
      done &&
      mc mb -p local/fms-local || true
      "
    restart: "no"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: fms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_URL: http://localhost:${FMS_BACKEND_PORT:-8000}
      FRONTEND_URL: http://localhost:${FMS_FRONTEND_PORT:-5174}
      SANCTUM_STATEFUL_DOMAINS: localhost:${FMS_FRONTEND_PORT:-5174},127.0.0.1:${FMS_FRONTEND_PORT:-5174},localhost:${FMS_BACKEND_PORT:-8000},127.0.0.1:${FMS_BACKEND_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fms
      DB_USERNAME: fms
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ENDPOINT: http://minio:9000
      AWS_BUCKET: fms-local
    working_dir: /var/www/html
    volumes:
      - ../../backend:/var/www/html
      - ../../backend/.env.docker:/var/www/html/.env
      - backend-vendor:/var/www/html/vendor
    healthcheck:
      test: ["CMD-SHELL", "php artisan about >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "${FMS_BACKEND_PORT:-8000}:8000"

  queue:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: fms-queue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:${FMS_BACKEND_PORT:-8000}
      FRONTEND_URL: http://localhost:${FMS_FRONTEND_PORT:-5174}
      SANCTUM_STATEFUL_DOMAINS: localhost:${FMS_FRONTEND_PORT:-5174},127.0.0.1:${FMS_FRONTEND_PORT:-5174},localhost:${FMS_BACKEND_PORT:-8000},127.0.0.1:${FMS_BACKEND_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fms
      DB_USERNAME: fms
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ENDPOINT: http://minio:9000
      AWS_BUCKET: fms-local
    working_dir: /var/www/html
    volumes:
      - ../../backend:/var/www/html
      - ../../backend/.env.docker:/var/www/html/.env
      - backend-vendor:/var/www/html/vendor
    command: ["php", "artisan", "queue:work", "--verbose", "--tries=1", "--timeout=90"]

  scheduler:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: fms-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:${FMS_BACKEND_PORT:-8000}
      FRONTEND_URL: http://localhost:${FMS_FRONTEND_PORT:-5174}
      SANCTUM_STATEFUL_DOMAINS: localhost:${FMS_FRONTEND_PORT:-5174},127.0.0.1:${FMS_FRONTEND_PORT:-5174},localhost:${FMS_BACKEND_PORT:-8000},127.0.0.1:${FMS_BACKEND_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fms
      DB_USERNAME: fms
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ENDPOINT: http://minio:9000
      AWS_BUCKET: fms-local
    working_dir: /var/www/html
    volumes:
      - ../../backend:/var/www/html
      - ../../backend/.env.docker:/var/www/html/.env
      - backend-vendor:/var/www/html/vendor
    command: ["php", "artisan", "schedule:work"]

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: fms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_PROXY_TARGET: http://backend:8000
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "${FMS_FRONTEND_PORT:-5174}:5173"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  backend-vendor:
  frontend-node-modules:
