server {
    listen 80;
    server_name fms.example.com;

    root /var/www/fms-app/current/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(api|sanctum|up|readyz)$ {
        root /var/www/fms-app/current/backend/public;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/(api|sanctum)/ {
        root /var/www/fms-app/current/backend/public;
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME /var/www/fms-app/current/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/fms-app/current/backend/public;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(env|log|sql|sqlite)$ {
        deny all;
    }
}
